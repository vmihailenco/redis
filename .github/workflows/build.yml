name: Go

on:
  push:
    branches: [master, v9]
  pull_request:
    branches: [master, v9]

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.21.x, 1.22.x, 1.23.x]

    services:
      redis:
        image: redis/redis-stack-server:latest
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Set up ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Test
        run: make test

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
  
  test-redis-ce:
    name: test-redis-ce
    runs-on: ubuntu-latest
    strategy:
        fail-fast: false
        matrix:
          client-libs-image-version:
            - "8.0-M03" # 8.0 milestone 3
            - "rs-7.4.0-v2" # redis stack 7.4
            - "rs-7.2.0-v14" # redis stack 7.2
            - "rs-6.2.6-v18" # redis stack 6.2
          go-version:
            - "1.21.x"
            - "1.22.x"
            - "1.23.x"

    steps:
      - name: Set up ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout code
        uses: actions/checkout@v4
      
      # Set up Docker Compose environment
      - name: Set up Docker Compose environment with standalone ${{ matrix.client-libs-image-version }}
        env:
          REDIS_CLT_IMAGE_VERSION: ${{ matrix.client-libs-image-version }}
        run: |
          docker compose --profile all up -d
      
      - name: Run tests
        env:
          USE_CONTAINERIZED_REDIS: "true"
          RE_CLUSTER: "true"
        run: |
          go test \
          --ginkgo.skip-file="ring_test.go" \
          --ginkgo.skip-file="sentinel_test.go" \
          --ginkgo.skip-file="osscluster_test.go" \
          --ginkgo.skip-file="pubsub_test.go" \
          --ginkgo.skip-file="gears_commands_test.go" \
          --ginkgo.label-filter='!NonRedisEnterprise'
