---

services:

  redis-stanalone:
    image: redislabs/client-libs-test:${REDIS_CLT_IMAGE_VERSION:-8.0-M02}
    container_name: redis-standalone
    environment:
      - REDIS_CLUSTER=no
      - PORT=6379
      - TLS_PORT=6666

    ports:
      - 6379:6379
      - 6380:6379
      - 6666:6666 # TLS port
    volumes:
      - "./dockers/redis-standalone:/redis/work"
    profiles:
      - standalone
      - all
